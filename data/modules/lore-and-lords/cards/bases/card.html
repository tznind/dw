<div class="card bases-card">
  <h3 class="card-title">🏘️ Bases of Operations</h3>
  <div class="card-content">
    <table id="bases" data-dynamic-table data-table-max="10">
      <thead>
        <tr>
          <th data-field="name">Name</th>
          <th data-field="town">Town</th>
          <th data-field="tags">Tags</th>
          <th data-field="complication">Complication</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button type="button" data-table-add="bases">+ Add Base</button>
  </div>
</div>
